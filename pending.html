<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pending Approval</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body class="auth-body">
  <main class="auth-page">
    <section class="auth-card">
      <div class="auth-brand">
        <img src="assets/rip-city-logo.png" alt="Rip City logo">
        <div>
          <h1>RIP CITY</h1>
          <p>Athlete Development</p>
        </div>
      </div>

      <div class="auth-heading">
        <p class="eyebrow">ACCOUNT CREATED</p>
        <h2>Pending Coach Approval</h2>
        <p>Your account was created successfully. A Rip City coach needs to approve your account before you can access the app.</p>
      </div>

      <button class="outline-btn full-btn" id="pending-logout-btn">Log Out</button>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabaseClient.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
