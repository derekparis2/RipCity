<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rip City Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body class="auth-body">
  <main class="auth-page">
    <section class="auth-card">
      <div class="auth-brand">
        <img src="assets/rip-city-logo.png" alt="Rip City logo">
        <div>
          <h1>RIP CITY</h1>
          <p>Athlete Development</p>
        </div>
      </div>

      <div class="auth-heading">
        <p class="eyebrow">WELCOME BACK</p>
        <h2>Log In</h2>
        <p>Access your Rip City account.</p>
      </div>

      <form id="login-form" class="auth-form">
        <div>
          <label for="login-identifier">Email or Username</label>
          <input id="login-identifier" type="text" autocomplete="username" required />
        </div>

        <div>
          <label for="login-password">Password</label>
          <input id="login-password" type="password" required />
        </div>

        <button type="submit" class="primary-btn full-btn">Log In</button>
      </form>

      <p class="auth-message" id="login-message"></p>

      <p class="auth-footer">
        Need an account? <a href="signup.html">Sign up here</a>
      </p>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabaseClient.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
